<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 380" width="100%" height="auto">
  <style>
    :root {
      --bg: #ffffff;
      --card-bg: #fafafa;
      --border: #e4e4e7;
      --text-primary: #09090b;
      --text-secondary: #71717a;
      --text-muted: #a1a1aa;
      --accent: #DE5E14;
      --accent-glow: rgba(222, 94, 20, 0.08);
      --font-mono: 'JetBrains Mono', 'Geist Mono', monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #09090b;
        --card-bg: #09090b;
        --border: #27272a;
        --text-primary: #f4f4f5;
        --text-secondary: #a1a1aa;
        --text-muted: #52525b;
        --accent-glow: rgba(222, 94, 20, 0.15);
      }
    }
    
    /* Common elements */
    .card { fill: var(--card-bg); stroke: var(--border); stroke-width: 1.5; rx: 8; transition: fill 0.3s, stroke 0.3s; }
    .card-title { font-family: var(--font-mono); font-size: 11px; font-weight: 700; fill: var(--text-secondary); letter-spacing: 0.05em; }
    .card-label { font-family: var(--font-mono); font-size: 10px; font-weight: 500; fill: var(--text-muted); }
    .text-code { font-family: var(--font-mono); font-size: 9.5px; fill: var(--text-primary); }
    
    /* AST Graphic */
    .ast-node { fill: var(--card-bg); stroke: var(--border); stroke-width: 1.5; rx: 4; }
    .ast-node.active { stroke: var(--accent); fill: var(--accent-glow); }
    .ast-text { font-family: var(--font-mono); font-size: 8.5px; font-weight: 600; fill: var(--text-secondary); text-anchor: middle; }
    .ast-text.active { fill: var(--accent); }
    .ast-edge { stroke: var(--border); stroke-width: 1.5; }
    .ast-edge.active { stroke: var(--accent); }
    
    /* Pointers / Lifetimes */
    .ptr-box { fill: var(--card-bg); stroke: var(--border); stroke-width: 1.5; rx: 2; }
    .ptr-box.active { stroke: var(--accent); }
    .ptr-arrow { stroke: var(--accent); stroke-width: 1.5; fill: none; }
    .ptr-head { fill: var(--accent); }
    
    /* Pipeline / Infrastructure */
    .pipeline-stage { fill: var(--card-bg); stroke: var(--border); stroke-width: 1.5; rx: 4; }
    .pipeline-stage.active { stroke: var(--accent); fill: var(--accent-glow); }
    .pipeline-connector { stroke: var(--text-muted); stroke-width: 1.2; stroke-dasharray: 3 3; }
    .pipeline-connector.active { stroke: var(--accent); stroke-dasharray: none; }
    
    /* Animations */
    @keyframes pulse {
      0% { opacity: 0.3; }
      50% { opacity: 1; }
      100% { opacity: 0.3; }
    }
    .pulsing-dot { animation: pulse 2s infinite ease-in-out; fill: var(--accent); }
    
    @keyframes dash {
      to {
        stroke-dashoffset: -20;
      }
    }
    .anim-dash { stroke-dasharray: 5; animation: dash 10s linear infinite; }
  </style>

  <!-- BACKGROUND -->
  <rect width="850" height="380" fill="none" />

  <!-- CARD 1: COMPILER ARCHITECTURE -->
  <g transform="translate(0, 0)">
    <rect class="card" width="490" height="190" />
    <text class="card-title" x="20" y="25">// 01. COMPILER ARCHITECTURE</text>
    
    <!-- AST Diagram Visual -->
    <g transform="translate(20, 45)">
      <!-- Edges -->
      <line class="ast-edge active" x1="100" y1="20" x2="60" y2="60" />
      <line class="ast-edge" x1="100" y1="20" x2="140" y2="60" />
      <line class="ast-edge active" x1="60" y1="60" x2="30" y2="100" />
      <line class="ast-edge active" x1="60" y1="60" x2="90" y2="100" />
      
      <!-- Nodes -->
      <g transform="translate(70, 0)">
        <rect class="ast-node active" width="60" height="24" />
        <text class="ast-text active" x="30" y="15">Function</text>
      </g>
      <g transform="translate(30, 48)">
        <rect class="ast-node active" width="60" height="24" />
        <text class="ast-text active" x="30" y="15">Block</text>
      </g>
      <g transform="translate(110, 48)">
        <rect class="ast-node" width="60" height="24" />
        <text class="ast-text" x="30" y="15">Signature</text>
      </g>
      <g transform="translate(0, 88)">
        <rect class="ast-node active" width="60" height="24" />
        <text class="ast-text active" x="30" y="15">LetStmt</text>
      </g>
      <g transform="translate(60, 88)">
        <rect class="ast-node" width="60" height="24" />
        <text class="ast-text" x="30" y="15">ExprStmt</text>
      </g>
    </g>
    
    <!-- Code Sample overlay -->
    <g transform="translate(260, 45)">
      <rect x="0" y="0" width="210" height="120" rx="4" fill="var(--card-bg)" stroke="var(--border)" stroke-width="1" />
      <text class="text-code" x="15" y="25" fill="var(--text-secondary)">fn parse(tokens: Vec&lt;Token&gt;) -&gt; AST {</text>
      <text class="text-code" x="30" y="45" fill="var(--text-secondary)">let mut stream = TokenStream::new(tokens);</text>
      <text class="text-code" x="30" y="65" fill="var(--text-secondary)">let mut ast = AST::new();</text>
      <text class="text-code" x="30" y="85" fill="var(--text-secondary)">ast.root = stream.parse_block();</text>
      <text class="text-code" x="30" y="105" fill="var(--accent)">ast // IR optimized representation</text>
      <text class="text-code" x="15" y="125" fill="var(--text-secondary)">}</text>
    </g>
  </g>

  <!-- CARD 2: MEMORY MANAGEMENT & LIFETIMES -->
  <g transform="translate(510, 0)">
    <rect class="card" width="340" height="190" />
    <text class="card-title" x="20" y="25">// 02. MEMORY AND LIFETIMES</text>
    
    <!-- Memory Stack vs Heap layout -->
    <g transform="translate(20, 45)">
      <text class="card-label" x="0" y="10">STACK (Frame: main)</text>
      <g transform="translate(0, 20)">
        <rect class="ptr-box active" width="110" height="24" />
        <text class="text-code" x="10" y="15">ptr: *const u8</text>
      </g>
      <g transform="translate(0, 50)">
        <rect class="ptr-box" width="110" height="24" />
        <text class="text-code" x="10" y="15">len: usize = 1024</text>
      </g>
      <g transform="translate(0, 80)">
        <rect class="ptr-box" width="110" height="24" />
        <text class="text-code" x="10" y="15">cap: usize = 2048</text>
      </g>
      
      <!-- Arrow from ptr to heap -->
      <path class="ptr-arrow anim-dash" d="M 110,32 Q 150,32 170,55" />
      <polygon class="ptr-head" points="172,58 171,51 166,54" />
      
      <text class="card-label" x="180" y="10">HEAP (Allocated)</text>
      <g transform="translate(180, 20)">
        <rect class="ptr-box active" width="120" height="90" fill="var(--accent-glow)" />
        <text class="text-code" x="10" y="20">0x7f9c // address</text>
        <text class="text-code" x="10" y="45" fill="var(--text-secondary)">[ 0xde, 0x5e, 0x14, ... ]</text>
        <text class="text-code" x="10" y="70" fill="var(--accent)">lifetime: 'a</text>
      </g>
      
      <!-- Pulsing Allocation Indicator -->
      <circle class="pulsing-dot" cx="290" cy="35" r="4" />
    </g>
  </g>

  <!-- CARD 3: KERNEL & RUNTIME -->
  <g transform="translate(0, 210)">
    <rect class="card" width="340" height="170" />
    <text class="card-title" x="20" y="25">// 03. RUNTIME &amp; SYSTEM ENVIRONMENT</text>
    
    <!-- Monospace Terminal Screen -->
    <g transform="translate(20, 45)">
      <rect x="0" y="0" width="300" height="100" rx="4" fill="var(--card-bg)" stroke="var(--border)" stroke-width="1" />
      <text class="text-code" x="12" y="22" fill="var(--accent)">$ uname -a</text>
      <text class="text-code" x="12" y="38" fill="var(--text-secondary)">Linux node-01 6.8.0-rust-native #1 SMP x86_64</text>
      <text class="text-code" x="12" y="58" fill="var(--accent)">$ cargo run --target wasm32-wasi --release</text>
      <text class="text-code" x="12" y="74" fill="var(--text-secondary)">Compiling compiler v0.1.0 (release)</text>
      <text class="text-code" x="12" y="90" fill="var(--text-secondary)">Running Target: WASM Pipeline Initialized</text>
    </g>
  </g>

  <!-- CARD 4: CLOUD DEVELOPMENT PIPELINE -->
  <g transform="translate(360, 210)">
    <rect class="card" width="490" height="170" />
    <text class="card-title" x="20" y="25">// 04. PIPELINE ORCHESTRATION</text>
    
    <!-- Deployment graph -->
    <g transform="translate(20, 45)">
      <g transform="translate(0, 30)">
        <rect class="pipeline-stage" width="70" height="34" />
        <text class="pipe-text" x="35" y="21" fill="var(--text-primary)" font-family="var(--font-mono)" font-size="9" text-anchor="middle">Cargo Lints</text>
      </g>
      
      <line class="pipeline-connector active" x1="70" y1="47" x2="110" y2="47" />
      
      <g transform="translate(110, 30)">
        <rect class="pipeline-stage" width="70" height="34" />
        <text class="pipe-text" x="35" y="21" fill="var(--text-primary)" font-family="var(--font-mono)" font-size="9" text-anchor="middle">Cargo Test</text>
      </g>
      
      <line class="pipeline-connector active" x1="180" y1="47" x2="220" y2="47" />
      
      <g transform="translate(220, 30)">
        <rect class="pipeline-stage active" width="80" height="34" />
        <text class="pipe-text active" x="40" y="21" font-family="var(--font-mono)" font-size="9" text-anchor="middle">Wasm Build</text>
      </g>
      
      <line class="pipeline-connector active" x1="300" y1="47" x2="340" y2="47" stroke-dasharray="2 2" />
      
      <g transform="translate(340, 30)">
        <rect class="pipeline-stage" width="90" height="34" />
        <text class="pipe-text" x="45" y="21" fill="var(--text-primary)" font-family="var(--font-mono)" font-size="9" text-anchor="middle">K8s Deployment</text>
      </g>
      
      <!-- Metrics overlay -->
      <text class="card-label" x="0" y="95">CI Status: SUCCESS</text>
      <text class="card-label" x="140" y="95">Coverage: 94.2%</text>
      <text class="card-label" x="270" y="95">Deploy Latency: 12ms</text>
    </g>
  </g>
</svg>
