<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 1150" width="100%" height="auto">
  <style>
    :root {
      --bg: #fafafa;
      --border: #e4e4e7;
      --text-primary: #09090b;
      --text-secondary: #71717a;
      --text-muted: #a1a1aa;
      --accent: #DE5E14;
      --accent-alpha: rgba(222, 94, 20, 0.05);
      --code-bg: #f4f4f5;
      --font-mono: 'JetBrains Mono', 'Geist Mono', 'SFMono-Regular', Consolas, monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #09090b;
        --border: #27272a;
        --text-primary: #f4f4f5;
        --text-secondary: #a1a1aa;
        --text-muted: #52525b;
        --accent-alpha: rgba(222, 94, 20, 0.12);
        --code-bg: #18181b;
      }
    }
    
    .bg { fill: var(--bg); stroke: var(--border); stroke-width: 1.5; transition: fill 0.3s, stroke 0.3s; }
    .grid-line { stroke: var(--border); stroke-width: 0.5; }
    .grid-line-major { stroke: var(--border); stroke-width: 1; }
    
    /* Terminal and Cards */
    .card-bg { fill: var(--code-bg); stroke: var(--border); stroke-width: 1; }
    
    /* Typography */
    .title { font-family: var(--font-mono); font-size: 26px; font-weight: 800; fill: var(--text-primary); letter-spacing: -0.05em; }
    .subtitle { font-family: var(--font-mono); font-size: 11px; font-weight: 700; fill: var(--accent); letter-spacing: 0.1em; }
    
    .section-title { font-family: var(--font-mono); font-size: 13px; font-weight: 800; fill: var(--text-primary); letter-spacing: 0.05em; }
    
    .mono-text { font-family: var(--font-mono); font-size: 12px; fill: var(--text-secondary); }
    .mono-bold { font-family: var(--font-mono); font-size: 12px; font-weight: bold; fill: var(--text-primary); }
    .mono-meta { font-family: var(--font-mono); font-size: 9px; fill: var(--text-secondary); }
    .mono-label { font-family: var(--font-mono); font-size: 9px; fill: var(--text-muted); font-weight: bold; }
    
    /* Toml Highlighting */
    .toml-key { fill: var(--accent); font-family: var(--font-mono); font-size: 12px; }
    .toml-val { fill: var(--text-primary); font-family: var(--font-mono); font-size: 12px; }
    .toml-comment { fill: var(--text-muted); font-family: var(--font-mono); font-size: 12px; }
    .toml-section { fill: var(--text-primary); font-family: var(--font-mono); font-size: 12px; font-weight: bold; }
    
    /* Schematic graphics */
    .schematic { stroke: var(--text-muted); stroke-width: 1; fill: none; }
    .schematic.active { stroke: var(--accent); stroke-width: 1.5; }
    .schematic-node { fill: var(--bg); stroke: var(--text-muted); stroke-width: 1; }
    .schematic-node.active { fill: var(--accent); stroke: var(--accent); }
    
    @keyframes pulse {
      0% { opacity: 0.3; }
      50% { opacity: 1; }
      100% { opacity: 0.3; }
    }
    .pulsing { animation: pulse 3s infinite ease-in-out; }
  </style>

  <!-- Outer frame -->
  <rect class="bg" width="850" height="1150" rx="6" />

  <!-- Coordinates Grid (Technical schematic aesthetic) -->
  <line class="grid-line-major" x1="40" y1="0" x2="40" y2="1150" />
  <line class="grid-line-major" x1="0" y1="40" x2="850" y2="40" />
  <line class="grid-line-major" x1="0" y1="180" x2="850" y2="180" />
  <line class="grid-line-major" x1="0" y1="1110" x2="850" y2="1110" />
  <line class="grid-line-major" x1="600" y1="0" x2="600" y2="180" />

  <!-- Margins Labeling -->
  <text class="mono-label" x="15" y="25">A1</text>
  <text class="mono-label" x="15" y="110">A2</text>
  <text class="mono-label" x="15" y="1135">A3</text>
  <text class="mono-label" x="60" y="25">SPECIFICATION: README_IMAGE_EXEC_v1.0</text>
  <text class="mono-label" x="615" y="25">MODULE INTERNALS</text>

  <!-- Header Identity -->
  <g transform="translate(60, 65)">
    <text class="title" x="0" y="25">dharshan-X</text>
    <text class="subtitle" x="0" y="50">SYSTEMS &amp; COMPILER ARCHITECTURES</text>
    <text class="mono-text" x="0" y="80">Designing deterministic memory layouts and high-throughput compiler pipelines.</text>
  </g>

  <!-- Technical Schematic (Header Right) -->
  <g transform="translate(615, 45)">
    <line class="grid-line" x1="0" y1="20" x2="200" y2="20" />
    <line class="grid-line" x1="0" y1="55" x2="200" y2="55" />
    <line class="grid-line" x1="0" y1="90" x2="200" y2="90" />
    <line class="grid-line" x1="70" y1="0" x2="70" y2="110" />
    <line class="grid-line" x1="140" y1="0" x2="140" y2="110" />

    <path class="schematic" d="M 15,20 L 70,55 L 140,20 L 185,55" />
    <path class="schematic active" d="M 15,90 L 70,55 L 140,90 L 185,55" />

    <circle class="schematic-node" cx="15" cy="20" r="3.5" />
    <circle class="schematic-node" cx="15" cy="90" r="3.5" />
    <circle class="schematic-node active pulsing" cx="70" cy="55" r="4.5" />
    <circle class="schematic-node" cx="140" cy="20" r="3.5" />
    <circle class="schematic-node" cx="140" cy="90" r="3.5" />
    <circle class="schematic-node active" cx="185" cy="55" r="4.5" />

    <text class="mono-meta" x="0" y="120">CORE_OPT [WASM-VM] -- STATUS: OK</text>
  </g>

  <!-- ================= SECTION 01: RUNTIME CONFIGURATION ================= -->
  <g transform="translate(60, 210)">
    <rect class="grid-line" x="0" y="-12" width="10" height="10" fill="var(--accent)" />
    <text class="section-title" x="20" y="0">// 01. RUNTIME CONFIGURATION</text>
    
    <!-- Code Terminal Frame -->
    <rect class="card-bg" x="0" y="20" width="730" height="260" rx="4" />
    <circle cx="20" cy="40" r="4" fill="#ff5f56" />
    <circle cx="35" cy="40" r="4" fill="#ffbd2e" />
    <circle cx="50" cy="40" r="4" fill="#27c93f" />
    <text class="mono-meta" x="70" y="43">dharshan.toml - Dev Environment Configurations</text>
    <line class="grid-line" x1="0" y1="55" x2="730" y2="55" />

    <!-- TOML Code Block lines -->
    <g transform="translate(20, 80)">
      <!-- [system] -->
      <text class="toml-section" x="0" y="0">[system]</text>
      
      <text class="toml-key" x="20" y="20">name</text><text class="toml-val" x="120" y="20">= "Dharshan"</text>
      <text class="toml-key" x="20" y="40">role</text><text class="toml-val" x="120" y="40">= "Systems &amp; Backend Engineer"</text>
      <text class="toml-key" x="20" y="60">location</text><text class="toml-val" x="120" y="60">= "Salem, Tamil Nadu, India"</text>
      <text class="toml-key" x="20" y="80">language</text><text class="toml-val" x="120" y="80">= "Rust // C++ // C"</text>

      <!-- [compiler_internals] -->
      <text class="toml-section" x="0" y="120">[compiler_internals]</text>
      
      <text class="toml-key" x="20" y="140">targets</text><text class="toml-val" x="120" y="140">= ["wasm32-wasi", "x86_64-unknown-linux-gnu"]</text>
      <text class="toml-key" x="20" y="160">optimizations</text><text class="toml-val" x="120" y="160">= ["mir-inliner", "dead-code-elimination", "register-allocation"]</text>

      <!-- [platforms] -->
      <text class="toml-section" x="380" y="0">[platforms]</text>
      
      <text class="toml-key" x="400" y="20">kernel</text><text class="toml-val" x="500" y="20">= "Linux"</text>
      <text class="toml-key" x="400" y="40">virtualization</text><text class="toml-val" x="500" y="40">= ["Docker", "Kubernetes"]</text>
      <text class="toml-key" x="400" y="60">pipeline</text><text class="toml-val" x="500" y="60">= ["GitLab CI", "GitHub Actions"]</text>

      <!-- Comments -->
      <text class="toml-comment" x="380" y="120"># Active optimizing pass pipelines</text>
      <text class="toml-key" x="380" y="140">ir_passes</text><text class="toml-val" x="500" y="140">= ["ssa", "cfg-simplification", "loop-vectorization"]</text>
    </g>
  </g>

  <!-- ================= SECTION 02: PIPELINE PASSES ================= -->
  <g transform="translate(60, 510)">
    <rect class="grid-line" x="0" y="-12" width="10" height="10" fill="var(--accent)" />
    <text class="section-title" x="20" y="0">// 02. PIPELINE PASSES &amp; DOMAINS</text>

    <!-- Column 1: Frontend Passes -->
    <g transform="translate(0, 30)">
      <rect class="card-bg" x="0" y="0" width="230" height="180" rx="4" />
      <path d="M 0,0 L 230,0" stroke="var(--accent)" stroke-width="2" />
      
      <text class="mono-bold" x="15" y="30">Frontend Compiler Passes</text>
      
      <text class="mono-bold" x="15" y="65">01 // AST Generation</text>
      <text class="mono-text" x="15" y="80">Lexing, parsing, and custom ASTs.</text>
      
      <text class="mono-bold" x="15" y="110">02 // Semantic Analysis</text>
      <text class="mono-text" x="15" y="125">Type inference &amp; scoping rules.</text>
      
      <text class="mono-bold" x="15" y="155">03 // Intermediate Rep</text>
      <text class="mono-text" x="15" y="170">Translation into SSA compiler forms.</text>
    </g>

    <!-- Flow indicator schematic lines -->
    <path class="schematic active" d="M 230,120 L 250,120 L 250,120 L 270,120" />
    <polygon points="270,117 276,120 270,123" fill="var(--accent)" />

    <!-- Column 2: VMs and Runtimes -->
    <g transform="translate(250, 30)">
      <rect class="card-bg" x="0" y="0" width="230" height="180" rx="4" />
      <path d="M 0,0 L 230,0" stroke="var(--accent)" stroke-width="2" />

      <text class="mono-bold" x="15" y="30">Virtual Machines &amp; Runtimes</text>

      <text class="mono-bold" x="15" y="65">01 // Stack Machines</text>
      <text class="mono-text" x="15" y="80">Custom WebAssembly interpreters.</text>

      <text class="mono-bold" x="15" y="110">02 // Memory Management</text>
      <text class="mono-text" x="15" y="125">Lock-free, slab &amp; cache-aligned.</text>

      <text class="mono-bold" x="15" y="155">03 // POSIX API Bindings</text>
      <text class="mono-text" x="15" y="170">Syscalls and custom socket layers.</text>
    </g>

    <!-- Flow indicator schematic lines -->
    <path class="schematic" d="M 480,120 L 500,120 M 480,120 L 500,120" />
    <polygon points="500,117 506,120 500,123" fill="var(--text-muted)" />

    <!-- Column 3: Systems Infra -->
    <g transform="translate(500, 30)">
      <rect class="card-bg" x="0" y="0" width="230" height="180" rx="4" />
      <path d="M 0,0 L 230,0" stroke="var(--text-muted)" stroke-width="2" />

      <text class="mono-bold" x="15" y="30">Systems Infrastructure</text>

      <text class="mono-bold" x="15" y="65">01 // Containerization</text>
      <text class="mono-text" x="15" y="80">Minimal, scratch-based builds.</text>

      <text class="mono-bold" x="15" y="110">02 // CI Pipelines</text>
      <text class="mono-text" x="15" y="125">Parallel, multi-target checks.</text>

      <text class="mono-bold" x="15" y="155">03 // K8s Operators</text>
      <text class="mono-text" x="15" y="170">Custom controller state machines.</text>
    </g>
  </g>

  <!-- ================= SECTION 03: ACTIVE PROJECTS ================= -->
  <g transform="translate(60, 760)">
    <rect class="grid-line" x="0" y="-12" width="10" height="10" fill="var(--accent)" />
    <text class="section-title" x="20" y="0">// 03. ACTIVE CRATES &amp; PROJECTS</text>

    <!-- Registry Table Grid -->
    <g transform="translate(0, 20)">
      <rect class="card-bg" x="0" y="0" width="730" height="180" rx="4" />
      
      <!-- Table Header -->
      <line class="grid-line" x1="0" y1="35" x2="730" y2="35" stroke-width="1.5" />
      <text class="mono-bold" x="20" y="22">Registry ID</text>
      <text class="mono-bold" x="180" y="22">System Description</text>
      <text class="mono-bold" x="550" y="22">Runtime Target</text>
      <text class="mono-bold" x="660" y="22">Stage</text>
      
      <!-- Row 1: wasm-vm -->
      <text class="mono-bold" x="20" y="62" fill="var(--accent)">wasm-vm</text>
      <text class="mono-text" x="180" y="62">Minimal WASI interpreter implemented in pure Rust</text>
      <text class="mono-text" x="550" y="62">wasm32-wasi</text>
      <text class="mono-bold" x="660" y="62">Beta</text>
      <line class="grid-line" x1="0" y1="75" x2="730" y2="75" />

      <!-- Row 2: ast-compiler -->
      <text class="mono-bold" x="20" y="97" fill="var(--accent)">ast-compiler</text>
      <text class="mono-text" x="180" y="97">Custom compiler frontend with custom SSA optimization passes</text>
      <text class="mono-text" x="550" y="97">x86_64-linux</text>
      <text class="mono-bold" x="660" y="97">Pre-alpha</text>
      <line class="grid-line" x1="0" y1="110" x2="730" y2="110" />

      <!-- Row 3: slab-alloc -->
      <text class="mono-bold" x="20" y="132" fill="var(--accent)">slab-alloc</text>
      <text class="mono-text" x="180" y="132">Cache-aligned slab allocator optimized for real-time systems</text>
      <text class="mono-text" x="550" y="132">Bare-metal / Unix</text>
      <text class="mono-bold" x="660" y="132">Stable</text>
      <line class="grid-line" x1="0" y1="145" x2="730" y2="145" />

      <!-- Row 4: sys-bpf -->
      <text class="mono-bold" x="20" y="167" fill="var(--accent)">sys-bpf</text>
      <text class="mono-text" x="180" y="167">Linux eBPF kernel telemetry filter and reporting utility</text>
      <text class="mono-text" x="550" y="167">x86_64-linux</text>
      <text class="mono-bold" x="660" y="167">Active</text>
    </g>
  </g>

  <!-- ================= SECTION 04: NETWORK PORTS ================= -->
  <g transform="translate(60, 985)">
    <rect class="grid-line" x="0" y="-12" width="10" height="10" fill="var(--accent)" />
    <text class="section-title" x="20" y="0">// 04. NETWORK SOCKETS &amp; PORTS</text>

    <g transform="translate(0, 20)">
      <!-- Line grid indicators -->
      <circle cx="20" cy="20" r="3.5" fill="var(--accent)" />
      <line class="schematic active" x1="20" y1="20" x2="120" y2="20" />
      <text class="mono-bold" x="130" y="24">Email</text>
      <text class="mono-text" x="230" y="24">you@email.com</text>

      <circle cx="20" cy="50" r="3.5" fill="var(--text-muted)" />
      <line class="schematic" x1="20" y1="50" x2="120" y2="50" />
      <text class="mono-bold" x="130" y="54">LinkedIn</text>
      <text class="mono-text" x="230" y="54">linkedin.com/in/dharshan-X</text>

      <circle cx="20" cy="80" r="3.5" fill="var(--text-muted)" />
      <line class="schematic" x1="20" y1="80" x2="120" y2="80" />
      <text class="mono-bold" x="130" y="84">Twitter</text>
      <text class="mono-text" x="230" y="84">twitter.com/dharshan-X</text>
    </g>
  </g>

  <!-- Footer Stats / Marks -->
  <g transform="translate(60, 1128)">
    <text class="mono-meta" x="0" y="0">SPEC-ID: <tspan fill="var(--text-primary)">ASM-README-99A</tspan></text>
    <text class="mono-meta" x="220" y="0">ENCODING: <tspan fill="var(--text-primary)">UTF-8 / XML</tspan></text>
    <text class="mono-meta" x="420" y="0">RENDER_MODE: <tspan fill="var(--text-primary)">VECTOR_ONLY</tspan></text>
    <text class="mono-meta" x="620" y="0">CRC32: <tspan fill="var(--text-primary)">0x8F9B2C4D</tspan></text>
  </g>

</svg>
