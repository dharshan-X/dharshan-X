<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 180" width="100%" height="auto">
  <style>
    :root {
      --bg: #ffffff;
      --border: #e4e4e7;
      --text-primary: #09090b;
      --text-secondary: #71717a;
      --text-muted: #a1a1aa;
      --accent: #DE5E14;
      --accent-alpha: rgba(222, 94, 20, 0.05);
      --font-mono: 'JetBrains Mono', 'Geist Mono', monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #09090b;
        --border: #27272a;
        --text-primary: #f4f4f5;
        --text-secondary: #a1a1aa;
        --text-muted: #52525b;
        --accent-alpha: rgba(222, 94, 20, 0.15);
      }
    }
    
    .bg { fill: var(--bg); stroke: var(--border); stroke-width: 1.5; transition: fill 0.3s; }
    .grid-line { stroke: var(--border); stroke-width: 0.5; }
    .grid-line-major { stroke: var(--border); stroke-width: 1; }
    
    /* Typography */
    .title { font-family: var(--font-mono); font-size: 26px; font-weight: 800; fill: var(--text-primary); letter-spacing: -0.05em; }
    .subtitle { font-family: var(--font-mono); font-size: 11px; font-weight: 700; fill: var(--accent); letter-spacing: 0.1em; }
    .mono-meta { font-family: var(--font-mono); font-size: 9px; fill: var(--text-secondary); }
    .mono-label { font-family: var(--font-mono); font-size: 9px; fill: var(--text-muted); font-weight: bold; }
    
    /* Schematic Lines */
    .schematic { stroke: var(--text-muted); stroke-width: 1; fill: none; }
    .schematic.active { stroke: var(--accent); stroke-width: 1.5; }
    .schematic-node { fill: var(--bg); stroke: var(--text-muted); stroke-width: 1; }
    .schematic-node.active { fill: var(--accent); stroke: var(--accent); }
    
    @keyframes pulse {
      0% { opacity: 0.2; }
      50% { opacity: 1; }
      100% { opacity: 0.2; }
    }
    .pulsing { animation: pulse 3s infinite ease-in-out; }
  </style>

  <!-- Main panel -->
  <rect class="bg" width="850" height="180" rx="4" />

  <!-- Drawing Board Coordinates -->
  <line class="grid-line-major" x1="30" y1="0" x2="30" y2="180" />
  <line class="grid-line-major" x1="0" y1="30" x2="850" y2="30" />
  <line class="grid-line-major" x1="0" y1="150" x2="850" y2="150" />
  <line class="grid-line-major" x1="580" y1="0" x2="580" y2="180" />

  <!-- Border markings -->
  <text class="mono-label" x="10" y="20">A1</text>
  <text class="mono-label" x="10" y="80">A2</text>
  <text class="mono-label" x="10" y="140">A3</text>
  <text class="mono-label" x="10" y="170">A4</text>
  <text class="mono-label" x="50" y="20">01 / GENERAL SPECIFICATION</text>
  <text class="mono-label" x="595" y="20">02 / INTERNALS SCHEMATIC</text>

  <!-- Identity Info -->
  <g transform="translate(50, 60)">
    <text class="title" x="0" y="20">dharshan-X</text>
    <text class="subtitle" x="0" y="45">SYSTEMS &amp; BACKEND ENGINEERING</text>
  </g>

  <!-- Revision info inside block -->
  <g transform="translate(50, 162)">
    <text class="mono-meta" x="0" y="0">REVISION: <tspan fill="var(--text-primary)">6.8.0-RUST</tspan></text>
    <text class="mono-meta" x="180" y="0">TARGET: <tspan fill="var(--text-primary)">WASM32-WASI / x86_64</tspan></text>
    <text class="mono-meta" x="380" y="0">LOC: <tspan fill="var(--text-primary)">SALEM, TN, IN</tspan></text>
  </g>

  <!-- Technical drawing in block 02 (Right side) -->
  <g transform="translate(600, 45)">
    <!-- Grid inside drawing -->
    <line class="grid-line" x1="0" y1="20" x2="220" y2="20" />
    <line class="grid-line" x1="0" y1="50" x2="220" y2="50" />
    <line class="grid-line" x1="0" y1="80" x2="220" y2="80" />
    <line class="grid-line" x1="60" y1="0" x2="60" y2="90" />
    <line class="grid-line" x1="140" y1="0" x2="140" y2="90" />

    <!-- Schematic lines representing node flow -->
    <path class="schematic" d="M 10,20 L 60,50 L 140,20 L 210,50" />
    <path class="schematic active" d="M 10,80 L 60,50 L 140,80 L 210,50" />

    <!-- Nodes -->
    <circle class="schematic-node" cx="10" cy="20" r="3.5" />
    <circle class="schematic-node" cx="10" cy="80" r="3.5" />
    <circle class="schematic-node active pulsing" cx="60" cy="50" r="4.5" />
    <circle class="schematic-node" cx="140" cy="20" r="3.5" />
    <circle class="schematic-node" cx="140" cy="80" r="3.5" />
    <circle class="schematic-node active" cx="210" cy="50" r="4.5" />

    <!-- Tech specs text -->
    <text class="mono-meta" x="0" y="100">AST_OPTIMIZER [MIR] -- ACTIVE</text>
  </g>

</svg>
